<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <!-- index.html 은 절대 캐시하지 않음(항상 최신 ?v= 참조를 받아오게) — 실기기에서 옛 ui.js 가 캐시되어 변경이 안 보이던 문제 방지 -->
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>RUNTIME — 프로그래밍 테마 웹 TCG</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- (Vercel Web Analytics 는 deploy/ 라이브 전용 — 루트는 file:// 개발용이라 제외) -->
    <script>
      // 첫 페인트 전 테마 확정(플래시 방지) — theme.js 의 rt_theme 와 동일 키
      (function () {
        try {
          document.documentElement.setAttribute(
            "data-theme",
            localStorage.getItem("rt_theme") || "dark",
          );
        } catch (e) {}
      })();
    </script>
    <style>
      /* 라이트(기본) = 레트로 PC + PCB 융합 팔레트 */
      :root {
        --shell: #b7b8c0;
        --chassis: #e9eaee;
        --chassis-alt: #ffffff;
        --chassis-sunk: #d4d5db;
        --ink: #1d1d24;
        --txt: #1d1d24;
        --muted: #6b6b75;
        --bevel-hi: #ffffff;
        --bevel-lo: #aeafb6;
        --bevel-lo2: #c4c5cc;
        --btn-bg: #1d1d24;
        --btn-fg: #e9eaee;
        --dot-hi: rgba(255, 255, 255, 0.55);
        --dot-lo: rgba(28, 28, 38, 0.1);
        --sel-bg: #1d1d24;
        --sel-fg: #e9eaee;
        --tb-dot: #86868f;
      }
      /* 다크 = 앰버 CRT 인광(기본 테마). 따뜻한 흑갈색 새시 + 호박색 강조 — 게임 보드가 이 팔레트를 씀. */
      :root[data-theme="dark"] {
        --shell: #0a0805;
        --chassis: #17110a;
        --chassis-alt: #1f180d;
        --chassis-sunk: #0d0a04;
        --ink: #3d3220;
        --txt: #f2e2c2;
        --muted: #b7a074;
        --bevel-hi: rgba(255, 210, 120, 0.06);
        --bevel-lo: rgba(0, 0, 0, 0.55);
        --bevel-lo2: rgba(0, 0, 0, 0.42);
        --btn-bg: #ffb000;
        --btn-fg: #17110a;
        --dot-hi: rgba(255, 200, 120, 0.04);
        --dot-lo: rgba(0, 0, 0, 0.32);
        --sel-bg: #ffb000;
        --sel-fg: #0c0a05;
        --tb-dot: #0a0805;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--shell);
        color: var(--txt);
        font-family: "IBM Plex Sans KR", sans-serif;
      }
      body {
        background-image:
          radial-gradient(var(--dot-hi) 1px, transparent 1px),
          radial-gradient(var(--dot-lo) 1px, transparent 1px);
        background-size:
          6px 6px,
          6px 6px;
        background-position:
          0 0,
          3px 3px;
        min-height: 100vh;
      }
      button {
        font: inherit;
        color: inherit;
        background: none;
        border: none;
        cursor: pointer;
        text-align: left;
      }
      input {
        font: inherit;
      }
      ::selection {
        background: var(--sel-bg);
        color: var(--sel-fg);
      }
      .mono {
        font-family: "Space Mono", monospace;
      }
      .grot {
        font-family: "Space Grotesk", sans-serif;
      }
      .bevel {
        border: 1px solid var(--ink);
        box-shadow:
          inset 1px 1px 0 var(--bevel-hi),
          inset -2px -2px 0 var(--bevel-lo),
          4px 4px 0 rgba(0, 0, 0, 0.3);
      }
      .bevel-s {
        border: 1px solid var(--ink);
        box-shadow:
          inset 1px 1px 0 var(--bevel-hi),
          inset -2px -2px 0 var(--bevel-lo2);
      }
      .btn {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        padding: 9px 14px;
        background: var(--btn-bg);
        color: var(--btn-fg);
        border: 1px solid var(--ink);
        box-shadow:
          inset 1px 1px 0 rgba(255, 255, 255, 0.3),
          inset -2px -2px 0 rgba(0, 0, 0, 0.45),
          2px 2px 0 rgba(0, 0, 0, 0.25);
        letter-spacing: 0.03em;
      }
      .btn.ghost {
        background: var(--chassis-sunk);
        color: var(--txt);
        box-shadow:
          inset 1px 1px 0 var(--bevel-hi),
          inset -2px -2px 0 var(--bevel-lo);
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .titlebar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 2px 7px;
        border-bottom: 1px solid var(--ink);
        background: repeating-linear-gradient(
          var(--ink) 0 1px,
          var(--chassis) 1px 3px
        );
      }
      .titlebar .dot {
        width: 11px;
        height: 11px;
        flex: none;
        border: 1px solid var(--ink);
        background: var(--chassis);
        box-shadow:
          inset 1px 1px 0 var(--bevel-hi),
          inset -1px -1px 0 var(--tb-dot);
      }
      .titlebar .t {
        margin: 0 auto;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        letter-spacing: 0.18em;
        font-size: 11px;
        background: var(--chassis);
        color: var(--txt);
        padding: 0 12px;
        border: 1px solid var(--ink);
        box-shadow: inset 1px 1px 0 var(--bevel-hi);
      }
      @keyframes pop {
        0% {
          transform: scale(0.85);
          opacity: 0;
        }
        60% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes bannerIn {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.86);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }
      @keyframes flash {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      @keyframes hitShake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-3px);
        }
        50% {
          transform: translateX(3px);
        }
        80% {
          transform: translateX(-2px);
        }
      }
      @keyframes popIn {
        0% {
          transform: scale(0.55);
          opacity: 0;
        }
        65% {
          transform: scale(1.12);
          opacity: 1;
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes drawIn {
        0% {
          transform: translateY(30px) scale(0.8);
          opacity: 0;
        }
        100% {
          transform: none;
          opacity: 1;
        }
      }
      @keyframes hitFlash {
        0% {
          box-shadow: 0 0 0 3px rgba(216, 71, 43, 0);
        }
        30% {
          box-shadow: 0 0 0 3px rgba(216, 71, 43, 0.7);
        }
        100% {
          box-shadow: 0 0 0 3px rgba(216, 71, 43, 0);
        }
      }
      @keyframes fireGlow {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(60, 138, 102, 0);
        }
        40% {
          box-shadow: 0 0 0 4px rgba(60, 138, 102, 0.55);
        }
      }
      @keyframes hbShake {
        0%,
        100% {
          transform: translate(0, 0);
        }
        15% {
          transform: translate(-4px, 3px);
        }
        30% {
          transform: translate(4px, -3px);
        }
        45% {
          transform: translate(-3px, 2px);
        }
        60% {
          transform: translate(3px, -2px);
        }
        80% {
          transform: translate(-2px, 1px);
        }
      }
      @keyframes hbShakeHard {
        0%,
        100% {
          transform: translate(0, 0);
        }
        10% {
          transform: translate(-8px, 5px);
        }
        25% {
          transform: translate(8px, -5px);
        }
        40% {
          transform: translate(-6px, 4px);
        }
        55% {
          transform: translate(6px, -3px);
        }
        70% {
          transform: translate(-4px, 2px);
        }
        85% {
          transform: translate(3px, -1px);
        }
      }
      @keyframes readyPulse {
        0%,
        100% {
          box-shadow:
            1px 1px 0 rgba(28, 28, 38, 0.18),
            0 0 0 0 rgba(200, 149, 27, 0);
        }
        50% {
          box-shadow:
            1px 1px 0 rgba(28, 28, 38, 0.18),
            0 0 7px 1px rgba(200, 149, 27, 0.65);
        }
      }
      @keyframes rotateGuide {
        0%,
        15% {
          transform: rotate(0);
        }
        55%,
        100% {
          transform: rotate(-90deg);
        }
      }
      @keyframes statChip {
        0%,
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
        50% {
          transform: scale(1.09);
          filter: brightness(1.18);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.001ms !important;
        }
      }
      /* ===== 모바일/좁은 화면(≤900px) — 셸을 화면에 꽉 채움. 내부 레이아웃은 core.js COMPACT 가 담당.
       덱 설정(타이틀)은 세로/가로 모두 지원, 대국 화면은 세로면 core.js 가 90° 회전해 항상 가로로 표시 ===== */
      button {
        touch-action: manipulation;
      }
      /* 게임 화면: 길게 눌러도 텍스트 선택/롱프레스 콜아웃/탭 하이라이트가 안 뜨게(모바일 조작 방해 제거) */
      #app {
        -webkit-tap-highlight-color: transparent;
      }
      #app,
      #app * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      @media (max-width: 900px) {
        #app {
          max-width: none !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        body > button {
          display: none !important;
        } /* 상단 고정 음소거/테마 버튼 숨김 — 화면 정리 */
      }
      /* 폰(≤560px): CRT 셸 여백·모서리·버튼 밀도 축소 — 온라인/타이틀/리더보드/매치메이킹 등 crt 화면 공통 개선 */
      @media (max-width: 560px) {
        .crt-monitor {
          padding: 7px;
          border-radius: 10px;
          box-shadow:
            inset 2px 2px 0 var(--housing-hi),
            inset -2px -2px 0 rgba(0, 0, 0, 0.28),
            3px 3px 0 rgba(0, 0, 0, 0.22);
        }
        .crt-screen {
          padding: 12px 11px;
          border-radius: 8px;
        }
        .crt-btn {
          padding: 12px 16px;
        }
        .crt-opt {
          padding: 8px 10px;
        }
      }
      /* =====================================================================
     레트로 컴퓨터 스킨 — 타이틀 모니터(.crt-monitor) + 전역 CRT 오버레이.
     다크 = 앰버 인광 CRT(어두운 방), 라이트 = 베이지 컴퓨터 + 페이퍼 화이트 화면(주광).
     색은 테마별 CSS 변수로 flip — 두 테마 모두 '켜진 브라운관' 컨셉으로 일관. */
      /* 전역 CRT 강도(라이트=옅게, 다크=진하게) */
      :root {
        --scan: rgba(0, 0, 0, 0.05);
        --vig: rgba(0, 0, 0, 0.12);
        --crt-inset: inset 0 0 90px rgba(0, 0, 0, 0.06);
      }
      :root[data-theme="dark"] {
        --scan: rgba(0, 0, 0, 0.22);
        --vig: rgba(0, 0, 0, 0.44);
        --crt-inset:
          inset 0 0 130px rgba(0, 0, 0, 0.6),
          inset 0 0 46px rgba(255, 150, 0, 0.05);
      }
      /* 타이틀 모니터 — 라이트(베이지 하우징 + 페이퍼 화면) 기본, 다크에서 앰버로 오버라이드 */
      .crt-monitor {
        --amb: #1d1d24;
        --amb-hi: #111319;
        --amb-dim: #6b6b75;
        --amb-soft: rgba(29, 29, 36, 0.32);
        --amb-faint: rgba(29, 29, 36, 0.06);
        /* 라이트 화면/하우징은 쿨 그레이 PCB 계열(#e9eaee·#d4d5db·#b7b8c0)로 중화 — 게임/튜토리얼과 톤 일치(밝기 유지, 색조만 웜→쿨) */
        --scr1: #f4f5f8;
        --scr2: #eceef2;
        --scr3: #e2e4ea;
        --scr4: #d3d5dd;
        --scr-fg: #1d1d24;
        --scr-inset: inset 0 0 40px rgba(0, 0, 0, 0.1);
        --scr-glowin: transparent;
        --scr-tsh: none;
        --housing1: #dfe0e5;
        --housing2: #c4c5cc;
        --housing-hi: rgba(255, 255, 255, 0.5);
        --cursor-glow: transparent;
        --inv: #f4f5f8;
        background: linear-gradient(var(--housing1), var(--housing2));
        border: 1px solid #000;
        border-radius: 16px;
        padding: clamp(11px, 1.8vw, 20px);
        box-shadow:
          inset 2px 2px 0 var(--housing-hi),
          inset -3px -3px 0 rgba(0, 0, 0, 0.28),
          6px 6px 0 rgba(0, 0, 0, 0.22);
      }
      :root[data-theme="dark"] .crt-monitor {
        --amb: #ffb000;
        --amb-hi: #ffd27a;
        --amb-dim: #b3791f;
        --amb-soft: rgba(255, 176, 0, 0.42);
        --amb-faint: rgba(255, 176, 0, 0.1);
        --scr1: #17110700;
        --scr2: #120d04;
        --scr3: #0b0803;
        --scr4: #060400;
        --scr-fg: #ffb000;
        --scr-inset: inset 0 0 70px rgba(0, 0, 0, 0.92);
        --scr-glowin: rgba(255, 176, 0, 0.07);
        --scr-tsh:
          0 0 1px rgba(255, 176, 0, 0.55), 0 0 7px rgba(255, 132, 0, 0.22);
        --housing1: #221d14;
        --housing2: #151109;
        --housing-hi: rgba(255, 255, 255, 0.05);
        --cursor-glow: rgba(255, 176, 0, 0.8);
        --inv: #0b0803;
      }
      .crt-screen {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid #000;
        background: radial-gradient(
          125% 105% at 50% 38%,
          var(--scr1) 0%,
          var(--scr2) 40%,
          var(--scr3) 72%,
          var(--scr4) 100%
        );
        box-shadow:
          var(--scr-inset),
          inset 0 0 14px var(--scr-glowin);
        padding: clamp(16px, 2.6vw, 32px);
        color: var(--scr-fg);
        font-family: "Space Mono", monospace;
        text-shadow: var(--scr-tsh);
      }
      /* 화면 로컬 비네트(양 테마 공통, 다크에서 진함) + 미세 깜빡임 */
      .crt-screen::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 4;
        background: radial-gradient(
          135% 125% at 50% 44%,
          transparent 54%,
          var(--vig) 100%
        );
        animation: crtFlick 4.5s steps(48) infinite;
      }
      @keyframes crtFlick {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 0.62;
        }
      }
      .crt-body {
        position: relative;
        z-index: 2;
      }
      .crt-cursor {
        display: inline-block;
        width: 0.6em;
        height: 1.05em;
        vertical-align: -2px;
        background: var(--amb);
        margin-left: 4px;
        box-shadow: 0 0 7px var(--cursor-glow);
        animation: crtBlink 1.05s steps(1) infinite;
      }
      @keyframes crtBlink {
        0%,
        49.9% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }
      .crt-opt {
        font-family: "Space Mono", monospace;
        font-weight: 700;
        color: var(--amb);
        background: transparent;
        border: 1px solid var(--amb-soft);
        padding: 9px 13px;
        cursor: pointer;
        text-shadow: inherit;
      }
      .crt-opt:hover {
        border-color: var(--amb);
        background: var(--amb-faint);
      }
      .crt-opt.on {
        background: var(--amb);
        color: var(--inv);
        text-shadow: none;
        border-color: var(--amb);
        box-shadow:
          0 0 9px var(--amb-faint),
          inset 0 0 0 1px rgba(0, 0, 0, 0.12);
      }
      .crt-btn {
        font-family: "Space Mono", monospace;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: var(--inv);
        background: var(--amb);
        border: 1px solid var(--amb);
        padding: 13px 24px;
        cursor: pointer;
        text-shadow: none;
        box-shadow:
          0 0 11px var(--amb-faint),
          2px 2px 0 rgba(0, 0, 0, 0.3);
      }
      .crt-btn.ghost {
        background: transparent;
        color: var(--amb);
        text-shadow: none;
        box-shadow:
          inset 0 0 0 1px var(--amb-soft),
          2px 2px 0 rgba(0, 0, 0, 0.22);
      }
      .crt-btn:not(:disabled):hover {
        filter: brightness(1.06);
      }
      @media (prefers-reduced-motion: reduce) {
        .crt-screen::after {
          animation: none;
        }
        .crt-cursor {
          animation: none;
        }
      }
      /* 전역 CRT 오버레이 — 두 테마 모두 화면 전체를 '켜진 브라운관 유리' 아래로. fixed·pointer-events:none 로 무간섭. */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2147483000;
        background: repeating-linear-gradient(
          rgba(0, 0, 0, 0) 0 2px,
          var(--scan) 2px 3px
        );
        mix-blend-mode: multiply;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2147482999;
        background: radial-gradient(
          130% 118% at 50% 44%,
          transparent 60%,
          var(--vig) 100%
        );
        box-shadow: var(--crt-inset);
      }
    </style>
  </head>
  <body>

      id="app"
      style="max-width: 1180px; margin: 0 auto; padding: clamp(3px, 0.5vw, 7px)"
    ></div>
    <!-- v 쿼리로 캐시 무효화 — 배포 때마다 숫자를 올리면 브라우저/CDN 캐시가 즉시 갱신됨 -->
    <script src="cards.js?v=83"></script>
    <script src="decks.js?v=80"></script>
    <script src="engine.js?v=83"></script>
    <script src="art-map.js?v=83"></script>
    <!-- ui.js 를 화면별 모듈로 분리(2026-07): 독립(sound/theme) → core(상태+매치+보드+AI) → 화면(title/tutorial/deckbuilder).
     로드 순서 중요: sound/theme 가 core 보다 먼저(UI.Sound/UI.SKIN 준비), 화면 모듈은 core 뒤(공유 헬퍼 준비). -->
    <script src="sound.js?v=80"></script>
    <script src="theme.js?v=80"></script>
    <!-- 멀티플레이 기반: config(백엔드 설정) → net(Supabase 클라이언트/게스트 인증). core 앞뒤 무관(UI 네임스페이스 공유). -->
    <script src="config.js?v=80"></script>
    <script src="net.js?v=82"></script>
    <script src="core.js?v=85"></script>
    <script src="title.js?v=82"></script>
